<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kokoro TTS Japanese</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #8c9eff;
            --btn-hover: #536dfe;
            --border-color: #333;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--container-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 650px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        button, select {
            background-color: #333;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.2s;
        }
        button:hover { background-color: var(--btn-hover); color: #fff; }
        textarea {
            width: 100%;
            height: 180px;
            background-color: #2c2c2c;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1rem;
            font-size: 1rem;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 1rem;
        }
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
        }
        .actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        .actions button {
            flex: 1;
            background-color: var(--accent-color);
            color: #000;
            font-weight: bold;
        }
        .actions button:hover { background-color: #5c6bc0; }
        .audio-container { margin-top: 1.5rem; }
        audio { width: 100%; border-radius: 6px; }
        #status-msg { display: none; margin-top: 1rem; color: var(--accent-color); font-size: 0.95rem; text-align: center; font-style: italic;}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 id="app-title" style="margin: 0;">Kokoro 音声合成</h2>
            <button id="lang-btn" onclick="toggleLang()">English</button>
        </div>
        
        <textarea id="text-input" placeholder="ここに日本語のテキストを入力してください..."></textarea>

        <div class="controls">
            <div class="control-group">
                <label id="lbl-voice">音声:</label>
                <select id="voice-select">
                    <option value="jf_alpha">jf_alpha (Female)</option>
                    <option value="jf_gongitsune">jf_gongitsune (Female)</option>
                    <option value="jf_nezumi">jf_nezumi (Female)</option>
                    <option value="jf_tebukuro">jf_tebukuro (Female)</option>
                    <option value="jm_kumo">jm_kumo (Male)</option>
                </select>
            </div>
            <div class="control-group">
                <label id="lbl-format">フォーマット:</label>
                <select id="format-select">
                    <option value="wav">WAV</option>
                    <option value="mp3">MP3</option>
                    <option value="ogg">OGG</option>
                    <option value="flac">FLAC</option>
                </select>
            </div>
        </div>

        <div class="actions">
            <button id="btn-play" onclick="playAudio()">再生</button>
            <button id="btn-download" onclick="downloadAudio()">ダウンロード</button>
        </div>

        <div id="status-msg">処理中... / Processing...</div>

        <div class="audio-container">
            <audio id="audio-player" controls></audio>
        </div>
    </div>

    <script>
        let currentLang = 'ja';
        const i18n = {
            ja: {
                title: "Kokoro 音声合成",
                langBtn: "English",
                placeholder: "ここに日本語のテキストを入力してください...",
                lblVoice: "音声:",
                lblFormat: "フォーマット:",
                btnPlay: "再生",
                btnDownload: "ダウンロード",
                statusProcessing: "処理中..."
            },
            en: {
                title: "Kokoro TTS",
                langBtn: "日本語",
                placeholder: "Enter Japanese text here...",
                lblVoice: "Voice:",
                lblFormat: "Format:",
                btnPlay: "Play",
                btnDownload: "Download",
                statusProcessing: "Processing..."
            }
        };

        function toggleLang() {
            currentLang = currentLang === 'ja' ? 'en' : 'ja';
            const t = i18n[currentLang];
            document.getElementById('app-title').innerText = t.title;
            document.getElementById('lang-btn').innerText = t.langBtn;
            document.getElementById('text-input').placeholder = t.placeholder;
            document.getElementById('lbl-voice').innerText = t.lblVoice;
            document.getElementById('lbl-format').innerText = t.lblFormat;
            document.getElementById('btn-play').innerText = t.btnPlay;
            document.getElementById('btn-download').innerText = t.btnDownload;
        }

        function getPayload() {
            return {
                text: document.getElementById('text-input').value,
                voice: document.getElementById('voice-select').value,
                format: document.getElementById('format-select').value
            };
        }

        function setStatus(active) {
            const statusDiv = document.getElementById('status-msg');
            statusDiv.innerText = i18n[currentLang].statusProcessing;
            statusDiv.style.display = active ? 'block' : 'none';
            document.getElementById('btn-play').disabled = active;
            document.getElementById('btn-download').disabled = active;
        }

        async function playAudio() {
            const payload = getPayload();
            if (!payload.text.trim()) return;

            setStatus(true);
            try {
                const response = await fetch('/api/play', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(errText || "Backend generation failed");
                }
                
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const player = document.getElementById('audio-player');
                player.src = url;
                player.play();
            } catch (error) {
                console.error(error);
                alert("Playback Error: " + error.message);
            } finally {
                setStatus(false);
            }
        }

        async function downloadAudio() {
            const payload = getPayload();
            if (!payload.text.trim()) return;

            setStatus(true);
            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(errText || "Conversion pipeline failed");
                }

                const filename = response.headers.get('X-Filename') || `ja_jp_unknown.${payload.format}`;
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

            } catch (error) {
                console.error(error);
                alert("Download Error:\n" + error.message);
            } finally {
                setStatus(false);
            }
        }
    </script>
</body>
</html>
